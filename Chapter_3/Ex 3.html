<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>City Night Life Gallery</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-bottom: 30px;
    }

    .gallery {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .card {
        background: #1e293b;
        padding: 15px;
        border-radius: 12px;
        width: 420px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card img {
        width: 100%;
        height: auto;
        border-radius: 10px;

        /* CSS FILTERS (required) */
        filter: brightness(1.15) contrast(1.25) saturate(1.3);

        transition: 0.3s ease;
    }

    .card img:hover {
        transform: scale(1.03);
        filter: brightness(1.3) contrast(1.4) saturate(1.6);
    }

    p {
        font-size: 12px;
        margin-top: 10px;
        color: #cbd5e1;
    }
</style>

</head>

<body>

<h1>City Night Life Gallery 🌃</h1>

<div class="gallery">

    <!-- IMAGE 1 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=800&q=80"
             alt="City skyline at night with glowing lights"
             width="400"
             height="267"
             title="Skyline Night View">

        <p>License: Unsplash License (Free for commercial use)</p>
    </div>

    <!-- IMAGE 2 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=800&q=80"
             alt="Neon street in a busy city at night"
             width="400"
             height="267"
             title="Neon Street City">

        <p>License: Unsplash License (Free for commercial use)</p>
    </div>

    <!-- IMAGE 3 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1508051123996-69f8caf4891d?auto=format&fit=crop&w=800&q=80"
             alt="Bridge illuminated over river at night"
             width="400"
             height="267"
             title="Bridge Night Lights">

        <p>License: Unsplash License (Free for commercial use)</p>
    </div>

</div>

</body>
</html>
